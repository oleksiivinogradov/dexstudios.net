<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onchain Scanner Directory</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <header>
      <div class="header-content">
        <h1>onchain<span class="highlight">radar</span></h1>
        <p class="subtitle">Multi-Chain Project Directory</p>
      </div>
    </header>

    <div class="projects-grid">
      <a href="./projects/motodex/" class="project-card glass">
        <img src="./projects/motodex/images/logo.png" alt="MotoDEX"
          onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22><rect width=%22100%22 height=%22100%22 fill=%22%2327272a%22/></svg>'">
        <h3>MotoDEX</h3>
        <p>Competitive racing game on the blockchain.</p>
      </a>

      <a href="./projects/dexgo/" class="project-card glass">
        <img src="./projects/dexgo/images/logo.png" alt="DexGo"
          onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22><rect width=%22100%22 height=%22100%22 fill=%22%2327272a%22/></svg>'">
        <h3>DexGo</h3>
        <p>Move-to-earn and play-to-earn AR platform.</p>
      </a>

      <a href="./projects/wizverse/" class="project-card glass">
        <img src="./projects/wizverse/images/logo.png" alt="Wizverse"
          onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22><rect width=%22100%22 height=%22100%22 fill=%22%2327272a%22/></svg>'">
        <h3>Wizverse</h3>
        <p>Immersive magical universe on the blockchain.</p>
      </a>
    </div>
  </div>
</body>

</html>

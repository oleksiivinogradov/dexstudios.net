<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Radar</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="../../project.css">
</head>

<body>
    <!-- Responsive Navbar -->
    <nav class="navbar">
        <div class="nav-content">
            <a href="../../" class="nav-brand">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L2 22h20L12 2z" />
                </svg>
                <span class="brand-text">Onchain<span class="highlight">Radar</span>.Dapp</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Project Header / Hero -->
        <section class="project-hero glass">
            <div class="hero-left">
                <img id="project-logo" src="" alt="Project Logo" class="project-img placeholder-pulse" />
                <div class="hero-info">
                    <h1 id="project-title" class="placeholder-text">Loading...</h1>
                    <p id="project-desc" class="placeholder-text-p"></p>
                    <div id="chain-badges" class="badges">
                        <!-- Dynamically populated chains -->
                    </div>
                    <a id="project-url" href="#" target="_blank" class="cta-link">
                        Open DApp
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                    </a>
                </div>
            </div>
            <div class="hero-right">
                <!-- Live Status -->
                <div class="live-status">
                    <span class="pulse-dot"></span> LIVE ON-CHAIN
                </div>
            </div>
        </section>

        <!-- Key Metrics -->
        <section class="metrics-grid">
            <div class="metric-card glass">
                <span class="m-label">Total Selected Tx</span>
                <h2 class="m-value" id="stat-total">--</h2>
            </div>
            <div class="metric-card glass">
                <span class="m-label">Tx Last 24H</span>
                <h2 class="m-value" id="stat-24h">--</h2>
            </div>
            <div class="metric-card glass">
                <span class="m-label">Tracked Contracts</span>
                <h2 class="m-value" id="stat-contracts">--</h2>
            </div>
        </section>

        <!-- Transactions -->
        <section class="tx-section glass">
            <div class="tx-header">
                <h3>Latest Transactions</h3>
                <span id="last-updated" class="last-updated">Updating...</span>
            </div>
            <div class="table-container">
                <table class="tx-table">
                    <thead>
                        <tr>
                            <th>Hash</th>
                            <th>Chain</th>
                            <th>Contract</th>
                            <th>Block</th>
                            <th class="right-align">Age</th>
                        </tr>
                    </thead>
                    <tbody id="tx-body">
                        <tr>
                            <td colspan="5" class="loading-state">
                                <div class="spinner"></div>
                                Scanning blockchain data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Background Effects -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <!-- Script that uses relative path '.' to fetch data -->
    <script type="module" src="../../project.js"></script>
</body>

</html>

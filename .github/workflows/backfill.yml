name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backfill'
        required: true
        default: '30'
        type: choice
        options:
          - '30'
          - '60'
          - '90'
      chain:
        description: 'Chain to backfill (leave empty for all chains)'
        required: false
        default: ''
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'radar/scripts/package-lock.json'

      - name: Install dependencies
        working-directory: ./radar/scripts
        run: npm install

      - name: Run backfill
        working-directory: ./radar/scripts
        run: |
          ARGS="--days=${{ github.event.inputs.days }}"
          if [ -n "${{ github.event.inputs.chain }}" ]; then
            ARGS="$ARGS --chain=${{ github.event.inputs.chain }}"
          fi
          node backfill.js $ARGS
        env:
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
          SOMNIA_API_KEY:      ${{ secrets.SOMNIA_API_KEY }}
          SKALE_API_KEY:       ${{ secrets.SKALE_API_KEY }}

      - name: Commit backfilled data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add \
            radar/projects/*/stats/*.json \
            radar/projects/*/wallets/**/*.json \
            radar/projects/*/wallets/*.json \
            radar/projects/*/uaw.json \
            radar/projects/ranking.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            CHAIN_LABEL="${{ github.event.inputs.chain }}"
            CHAIN_LABEL="${CHAIN_LABEL:-all chains}"
            git commit -m "chore(radar): backfill ${{ github.event.inputs.days }}d history ($CHAIN_LABEL)"
            git push
          fi

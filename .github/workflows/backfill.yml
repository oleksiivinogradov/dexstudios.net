name: Backfill Historical Data

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of history to backfill (e.g. 30). Ignored if start_date is set.'
        required: false
        default: '30'
        type: string
      start_date:
        description: 'Start date YYYY-MM-DD (optional, overrides days)'
        required: false
        default: ''
        type: string
      end_date:
        description: 'End date YYYY-MM-DD (optional, defaults to today)'
        required: false
        default: ''
        type: string
      chain:
        description: 'Chain to backfill (leave empty for all chains)'
        required: false
        default: ''
        type: string

# Use same concurrency group as the periodic scanner so they never run
# simultaneously and step on each other's stats/wallet files.
concurrency:
  group: radar-scanner
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 h ceiling; incremental saves let the next run resume
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'radar/scanner/package-lock.json'

      - name: Install dependencies
        working-directory: ./radar/scanner
        run: npm install

      - name: Run backfill
        working-directory: ./radar/scanner
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="--from=${{ github.event.inputs.start_date }}"
            if [ -n "${{ github.event.inputs.end_date }}" ]; then
              ARGS="$ARGS --to=${{ github.event.inputs.end_date }}"
            fi
          else
            ARGS="--days=${{ github.event.inputs.days }}"
          fi
          if [ -n "${{ github.event.inputs.chain }}" ]; then
            ARGS="$ARGS --chain=${{ github.event.inputs.chain }}"
          fi
          echo "Running: node backfill.js $ARGS"
          node backfill.js $ARGS

      - name: Commit backfilled data
        # Run even if backfill was canceled/timed-out so partial results are saved
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # Stage both project data and backfill progress state files
          git add -A radar/projects/ radar/scanner/backfill_*.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            CHAIN_LABEL="${{ github.event.inputs.chain }}"
            CHAIN_LABEL="${CHAIN_LABEL:-all chains}"

            if [ -n "${{ github.event.inputs.start_date }}" ]; then
              LABEL="${{ github.event.inputs.start_date }}→${{ github.event.inputs.end_date || 'today' }}"
            else
              LABEL="${{ github.event.inputs.days }}d"
            fi

            git commit -m "chore(radar): backfill ${LABEL} (${CHAIN_LABEL})"
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in 5s..."
              sleep 5
            done
          fi

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Scanner Dependencies
        working-directory: ./radar/scanner
        run: npm install

      - name: Run Radar Scanner
        working-directory: ./radar/scanner
        run: npm start
        
      - name: Build
        run: npm run build
        
      - name: Copy Radar to Dist
        run: |
          mkdir -p dist/radar
          cp radar/index.html dist/radar/
          cp radar/style.css dist/radar/
          cp radar/main.js dist/radar/
          cp radar/project.css dist/radar/ || true
          cp radar/project.js dist/radar/ || true
          cp -r radar/projects dist/radar/projects || true
          cp -r radar/evm dist/radar/evm || true
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

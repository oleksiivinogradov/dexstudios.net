name: Periodic Radar Scanner

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Using a PAT instead of GITHUB_TOKEN if we want to trigger other workflows,
          # but for simply committing data back, GITHUB_TOKEN is fine.
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'radar/scanner/package-lock.json' # Will fallback gracefully if no lockfile

      - name: Install Scanner Dependencies
        working-directory: ./radar/scanner
        run: npm install
        
      - name: Run Scanner 
        working-directory: ./radar/scanner
        run: npm start
        
      - name: Commit Updated Aggregation Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add radar/evm/50312/0x6CD6978C794ee76d8440CB0a81CF3B200a39c7E3/aggregation.json
          
          # Only commit and push if there are changes
          if ! git diff --staged --empty; then
            git commit -m "chore(radar): auto-update Somnia network transactions data"
            git push
          else
            echo "No changes to aggregation.json detected."
          fi

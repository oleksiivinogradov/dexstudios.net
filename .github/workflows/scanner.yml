name: Periodic Radar Scanner

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Only one scanner job runs at a time; new ones wait instead of queuing duplicates
concurrency:
  group: radar-scanner
  cancel-in-progress: false

jobs:
  scan-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h ceiling for first-run bootstrap of fast chains
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Using a PAT instead of GITHUB_TOKEN if we want to trigger other workflows,
          # but for simply committing data back, GITHUB_TOKEN is fine.
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'radar/scanner/package-lock.json' # Will fallback gracefully if no lockfile

      - name: Install Scanner Dependencies
        working-directory: ./radar/scanner
        run: npm install
        
      - name: Run Scanner 
        working-directory: ./radar/scanner
        run: npm start
        
      - name: Commit Updated Scanner Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add \
            radar/projects/*/stats/*.json \
            radar/projects/*/wallets/**/*.json \
            radar/projects/*/wallets/*.json \
            radar/projects/*/uaw.json \
            radar/projects/ranking.json \
            radar/scanner/*_state.json

          if git diff --staged --quiet; then
            echo "No scanner data changes detected."
          else
            git commit -m "chore(radar): scanner sync $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
